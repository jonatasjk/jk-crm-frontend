name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: System info
        run: |
          echo "### System Info" >> $GITHUB_STEP_SUMMARY
          echo "- Node: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "- npm: $(npm --version)" >> $GITHUB_STEP_SUMMARY
          echo "- OS: $(uname -a)" >> $GITHUB_STEP_SUMMARY

      - name: Install dependencies
        run: |
          npm ci > install.log 2>&1
          EXIT=$?
          cat install.log
          if [ $EXIT -ne 0 ]; then
            echo "### ❌ Install failed (exit $EXIT)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat install.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT
          fi

      - name: Type check
        run: |
          npm run typecheck > typecheck.log 2>&1
          EXIT=$?
          cat typecheck.log
          if [ $EXIT -ne 0 ]; then
            echo "### ❌ Typecheck failed (exit $EXIT)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat typecheck.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT
          fi

      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Run tests with coverage
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: '*.log'
          if-no-files-found: warn
