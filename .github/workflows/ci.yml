name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: System info
        run: |
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "OS: $(uname -a)"

      - name: Install dependencies
        run: |
          set +e
          npm ci 2>&1 | tee install.log
          npm_exit=${PIPESTATUS[0]}
          set -e
          if [ $npm_exit -ne 0 ]; then
            echo "::error title=npm ci failed::Exit code $npm_exit. See annotations below."
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done < install.log
            exit $npm_exit
          fi

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: '*.log'
          if-no-files-found: warn
